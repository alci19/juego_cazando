<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego Cazando</title>
  <link rel="stylesheet" href="cazando.css">
</head>

<body onload="iniciarJuego();">

  <div class="game-container">

    <header class="game-header">
      <h1>🎮 Juego Cazando</h1>
      <p class="autor">Byron Farinango</p>
    </header>

    <section class="game-panel">
      <div class="stat">
        <span>Puntos</span>
        <strong id="txtpuntos">0</strong>
      </div>
      <div class="stat">
        <span>Tiempo</span>
        <strong id="txttiempo">15</strong>
      </div>
    </section>

    <section class="game-area">
  
  <img src="logo_alci.png" class="logo lado-izq">

  <canvas id="areaJuego" width="500" height="500"></canvas>

  <img src="logo_alci.png" class="logo lado-der">

    </section>

    <section class="controles">
      <button onclick="moverArriba()">⬆</button>
      <div>
        <button onclick="moverIzquierda()">⬅</button>
        <button onclick="moverAbajo()">⬇</button>
        <button onclick="moverDerecha()">➡</button>
      </div>
      <button class="reset" onclick="reiniciar()">🔄 Reiniciar</button>
    </section>

    <p id="mensaje"></p>

  </div>

  <script src="utilitarios.js"></script>
  <script src="cazando.js"></script>

</body>
</html>
